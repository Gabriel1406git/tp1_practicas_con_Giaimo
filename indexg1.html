             </ul>
             </div>
    </div>

    <audio id="musErg" src="./audio/Precision.m4a.mp3" preload="auto"></audio>
    <script>
    function sonidoclick(event){
        event.preventDefault();
        const sonido = document.getElementById("musErg");
        const destino = event.currentTarget.href;

        sonido.play().then(() => {
            const duracion = sonido.duration || 1; 
            setTimeout(() => {
                window.location.href = destino;
            }, duracion * 1000);
        }).catch((error) => {
            console.error("No se pudo reproducir el sonido:", error);
            window.location.href = destino; 
        });
    }
        window.onload=function(){
            const enlace = document.querySelectorAll('.opc a');
            enlace.forEach(enlace => {
                enlace.addEventListener('click', sonidoclick);
        });

    };
    </script>
</body>
